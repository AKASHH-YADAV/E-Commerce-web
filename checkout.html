<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-family: Arial; }
.box {
  max-width: 500px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a href="index.html" class="navbar-brand">⬅ Back to Cart</a>
  </div>
</nav>

<div class="container my-5">
  <div class="box text-center">

    <h2>💳 Checkout</h2>

    <h4 class="mt-4">Total Amount: ₹<span id="total">0</span></h4>

    <button onclick="payNow()" class="btn btn-success mt-3 w-100">
      Pay Now
    </button>

  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Calculate total
function getTotal() {
  let total = 0;
  cart.forEach(item => {
    total += item.price * item.qty;
  });
  return total;
}

// Show total
document.getElementById("total").innerText = getTotal();

// Payment
function payNow() {
  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }

  // Clear cart
  localStorage.removeItem("cart");

  // Set total to 0
  document.getElementById("total").innerText = 0;

  // Success alert
  alert("✅ Payment Successful!");

  // Optional redirect
  window.location.href = "index.html";
}
</script>

</body>
</html>
