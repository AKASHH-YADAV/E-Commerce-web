<!DOCTYPE html>
<html>
<head>
  <title>Cart - Mini Amazon</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔹 Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">🛒 Mini Amazon</span>

    <a href="index.html" class="btn btn-light">Home</a>

    <a href="cart.html" class="btn btn-warning">
      Cart <span id="cart-count">0</span>
    </a>
  </div>
</nav>

<!-- 🔹 Cart Section -->
<div class="container mt-4">
  <h2 class="text-center mb-4">🛒 Your Shopping Cart</h2>

  <!-- Cart Items -->
  <div id="cart-items"></div>

  <!-- Total -->
  <h4 id="total" class="text-end"></h4>

  <!-- Checkout Button -->
  <div class="text-end">
    <a href="checkout.html" class="btn btn-success mt-3">
      Proceed to Checkout 💳
    </a>
  </div>
</div>

<!-- 🔹 Footer -->
<footer class="text-center mt-5 p-3 bg-dark text-white">
  <p>© 2026 Mini Amazon | Project by Student</p>
</footer>

<!-- JS -->
<script src="script.js"></script>

<script>
  // Load cart data
  showCart();
  updateCartCount();
</script>

</body>
</html>
